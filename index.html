<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>LoL 配信待機画面</title>

  <!-- Google Fonts: Cinzel (英字タイトル) + Noto Sans JP (日本語) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- p5.js (背景アニメーション) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- スタイルシート -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =====================================================
       背景レイヤー: p5.js キャンバスがここに挿入される
       ===================================================== -->
  <div id="bg-canvas-container"></div>

  <!-- パーティクルキャンバス (浮遊する光の粒) -->
  <canvas id="particle-canvas"></canvas>

  <!-- ビネット効果 -->
  <div id="vignette"></div>

  <!-- =====================================================
       コーナー装飾
       ===================================================== -->
  <div class="corner-deco tl"></div>
  <div class="corner-deco tr"></div>
  <div class="corner-deco bl"></div>
  <div class="corner-deco br"></div>

  <!-- =====================================================
       メインオーバーレイ
       ===================================================== -->
  <div id="overlay">

    <!-- ---- 時計 (左上) ---- -->
    <div class="clock-arc-wrapper">
      <div class="clock-arc"></div>
      <div class="clock-arc-inner"></div>
    </div>
    <section id="clock-section">
      <div id="date-display">2026.03.14</div>
      <div id="time-display">
        <span id="time-h">00</span>
        <span id="time-colon">:</span>
        <span id="time-m">00</span>
        <span id="time-colon2">:</span>
        <span id="time-s">00</span>
      </div>
    </section>

    <!-- ---- LIVE バッジ (上部中央) ---- -->
    <section id="live-section">
      <div id="live-badge">
        <span class="live-dot"></span>
        <span class="live-text">LIVE</span>
      </div>
      <div class="live-deco-line">
        <div class="live-deco-diamond"></div>
      </div>
    </section>

    <!-- ---- メインメッセージ / 大会情報 ---- -->
    <section id="message-section">
      <div id="main-message">配信開始までしばらくお待ちください</div>
      <div id="tournament-info">
        <span id="tournament-name">Nexus Cup 交流大会</span>
        <span id="tournament-schedule">19:00より</span>
      </div>
      <div class="tournament-deco"></div>
    </section>

    <!-- ---- 配信終了画面 (mode='ending' のときのみ表示) ---- -->
    <section id="end-section">
      <div id="end-deco-top"></div>
      <div id="end-main-message">ご視聴ありがとうございました</div>
      <div id="end-sub-message">配信は終了いたしました</div>
      <div id="end-deco-bottom"></div>
    </section>

    <!-- ---- チームカードセクション ---- -->
    <section id="team-section">
      <div id="team-section-header">
        <span class="section-label">PARTICIPATING TEAMS</span>
      </div>
      <div id="team-card-container">
        <!-- JavaScriptで動的に生成 -->
      </div>
      <div id="team-indicators">
        <!-- JavaScriptで動的に生成 -->
      </div>
    </section>

    <!-- ---- BGM情報 (右下) ---- -->
    <section id="bgm-section">
      <div id="bgm-icon-area">
        <div id="bgm-notes"></div>
      </div>
      <div id="bgm-info">
        <div id="bgm-label">Inst.音源</div>
        <div id="bgm-artist">騒音のない世界</div>
        <div id="bgm-title">きらめくウィークエンド</div>
      </div>
    </section>

  </div><!-- #overlay -->

  <!-- =====================================================
       スクリプト読み込み
       順番: config → background (p5) → main (UI)
       ===================================================== -->
  <script src="config.js"></script>
  <script src="background.js"></script>
  <script src="main.js"></script>

</body>
</html>
